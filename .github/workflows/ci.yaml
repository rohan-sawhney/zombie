name: CI                    # display name in the GitHub UI

on: [push]                  # WHEN to run: every git push

jobs:                       # WHAT to run
  build:                    # a job id (your choice of name)
    runs-on: ubuntu-latest  # which VM to rent
    steps:                  # commands, executed top to bottom
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Compile code
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build code
        run: cmake --build build -J