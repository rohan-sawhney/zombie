name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md','demo/imgs/*','imgs/*']
  pull_request:
    paths-ignore: ['**.md','demo/imgs/*','imgs/*']

jobs:
  # ------------------------------------------------------------------------------------------------------
  # C++ demo build - How a C++ developer uses the repo
  # ------------------------------------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest] 
  
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Code compilation
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j --config Release

      - name: Demo smoke tests (C++)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          ./demo/demo ../demo/model_problems/engine/wost.json
          ./demo/demo ../demo/model_problems/engine/bvc.json
          ./demo/demo ../demo/model_problems/engine/rws.json
      
      - name: Check demo outputs (C++)
        if: runner.os != 'Windows'
        run: |
          test -s demo/model_problems/engine/solutions/wost.pfm
          test -s demo/model_problems/engine/solutions/bvc.pfm
          test -s demo/model_problems/engine/solutions/rws.pfm

  # ------------------------------------------------------------------------------------------------------
  # Python bindings - How a python developer uses the repo
  # ------------------------------------------------------------------------------------------------------
  python-bindings:
    strategy:
      fail-fast: false
      matrix:
          os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest]
          python-version: ["3.9", "3.12"]
    runs-on: ${{matrix.os}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
            python-version: ${{matrix.python-version}}
      
      - name: Install
        run: pip install .

      - name: Installation Smoke test
        run: python -c "import zombie; print(zombie.__file__)"

      - name: DEBUG — solutions folder at start
        if: runner.os != 'Windows'
        run: |
          echo "== solutions/ at job start =="
          ls -la demo/model_problems/engine/solutions/ 2>&1 || echo "(folder does not exist)"

      - name: Demo smoke tests (Python)
        if: runner.os != 'Windows'
        run: |
          pip install matplotlib
          mkdir -p demo/model_problems/engine/solutions
          echo "== after mkdir =="
          ls -la demo/model_problems/engine/solutions/
          rm -f demo/model_problems/engine/solutions/*.pfm
          rm -f demo/model_problems/engine/solutions/*.png
          echo "== after cleanup =="
          ls -la demo/model_problems/engine/solutions/
          python demo/demo.py --config=demo/model_problems/engine/wost.json
          python demo/demo.py --config=demo/model_problems/engine/bvc.json
          python demo/demo.py --config=demo/model_problems/engine/rws.json
          echo "== after all three demos =="
          ls -la demo/model_problems/engine/solutions/

      # - name: Demo smoke tests (Python)
      #   if: runner.os != 'Windows'
      #   run: |
      #     pip install matplotlib
      #     mkdir -p demo/model_problems/engine/solutions
      #     rm -f demo/model_problems/engine/solutions/*.pfm
      #     rm -f demo/model_problems/engine/solutions/*.png
      #     python demo/demo.py --config=demo/model_problems/engine/wost.json
      #     python demo/demo.py --config=demo/model_problems/engine/bvc.json
      #     python demo/demo.py --config=demo/model_problems/engine/rws.json
      
      - name: Check demo outputs (Python)
        if: runner.os != 'Windows'
        run: |
          test -s demo/model_problems/engine/solutions/wost.pfm
          test -s demo/model_problems/engine/solutions/bvc.pfm
          test -s demo/model_problems/engine/solutions/rws.pfm