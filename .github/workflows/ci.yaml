name: CI                    # display name in the GitHub UI

on: [push]                  # WHEN to run: every git push

jobs:
  # ------------------------------------------------------------------------------------------------------
  # C++ demo build - How a C++ developer uses the repo
  # ------------------------------------------------------------------------------------------------------
  build:                   # a job id (your choice of name)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest] # VM to rent 
  
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache build tree
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('.gitmodules', '.git/modules/**/HEAD') }}
      
      - name: Code compilation
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j --config Release

      - name: Demo smoke tests (C++)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          ./demo/demo ../demo/model_problems/engine/wost.json
          ./demo/demo ../demo/model_problems/engine/bvc.json
          ./demo/demo ../demo/model_problems/engine/rws.json
      
      - name: Check demo outputs (C++)
        if: runner.os != 'Windows'
        run: |
          test -s demo/model_problems/engine/solutions/wost.pfm
          test -s demo/model_problems/engine/solutions/bvc.pfm
          test -s demo/model_problems/engine/solutions/rws.pfm

  # ------------------------------------------------------------------------------------------------------
  # Python bindings - How a python develop uses the repo
  # ------------------------------------------------------------------------------------------------------
  python-bindings:
    strategy:
      fail-fast: false
      matrix:
          os: [ubuntu-22.04, ubuntu-latest, macos-latest, windows-latest]
          python-version: ["3.9", "3.12"]
    runs-on: ${{matrix.os}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
            python-version: ${{matrix.python-version}}
            cache: pip
      
      - name: Install
        run: pip install .

      - name: Installation Smoke test
        run: python -c "import zombie; print(zombie.__file__)"

      - name: Demo smoke tests (Python)
        if: runner.os != 'Windows'
        run: |
          pip install matplotlib
          rm -r demo/model_problems/engine/solutions/*
          python demo/demo.py --config=demo/model_problems/engine/wost.json
          python demo/demo.py --config=demo/model_problems/engine/bvc.json
          python demo/demo.py --config=demo/model_problems/engine/rws.json
      
      - name: Check demo outputs (Python)
        if: runner.os != 'Windows'
        run: |
          test -s demo/model_problems/engine/solutions/wost.pfm
          test -s demo/model_problems/engine/solutions/bvc.pfm
          test -s demo/model_problems/engine/solutions/rws.pfm