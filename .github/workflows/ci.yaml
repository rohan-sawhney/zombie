name: CI                    # display name in the GitHub UI

on: [push]                  # WHEN to run: every git push

jobs:                       # WHAT to run
  build:                   # a job id (your choice of name)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest] # VM to rent
        python-version: ["3.9", "3.12"] # Python 3.9 is the base python vrsion used for the project and python 3.12 is the latest python version while testing the workflow 
    
    runs-on: ${{matrix.os}}
    steps:                  # commands, executed top to bottom
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: ${{matrix.python-version}}
      
      - name: Install
        run: pip install .

      - name: Smoke test
        run: python -c "import zombie; print(zombie.__file__)"